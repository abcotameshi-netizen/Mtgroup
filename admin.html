<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理画面</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0f16;color:#fff;padding:20px;}
button{margin:4px 2px;padding:6px 10px;background:#1f2937;color:#fff;border:none;border-radius:6px;cursor:pointer;}
input, textarea, select{width:100%;margin:6px 0;padding:6px;}
.panel{background:#111827;padding:12px;border-radius:8px;margin-bottom:20px;}
.item{background:#1f2937;padding:8px;border-radius:6px;margin:6px 0;}
</style>
</head>

<body>

<h2>管理画面</h2>

<button onclick="login()">パスワード入力</button>
<button onclick="logout()">ログアウト</button>

<div id="mainPanel" style="display:none;">

<!-- フォント設定 -->
<div class="panel">

<h3>フォント設定</h3>

<select id="fontSelect">

<option value="'Georgia', serif">
標準フォント
</option>

<option value="'Noto Sans JP', sans-serif">
Noto Sans
</option>

<option value="Arial, sans-serif">
Arial
</option>

<option value="'Orbitron', sans-serif">
Orbitron
</option>

<option value="'M PLUS 1p', sans-serif">
M PLUS
</option>

</select>

<button onclick="saveFont()">保存</button>

</div>


</div>

<script>

const ADMIN_PASSWORD="1234";

function login(){

const pass=prompt("パスワード");

if(pass===ADMIN_PASSWORD){

document.getElementById("mainPanel").style.display="block";

}else{

alert("違います");

}

}

function logout(){

location.reload();

}


function saveFont(){

const font=
document.getElementById("fontSelect").value;

localStorage.setItem("siteFont",font);

alert("フォント保存しました");

}

</script>

</body>
</html>
