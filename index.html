<!doctype html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>製品一覧</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p&display=swap" rel="stylesheet"><style>
*{ box-sizing:border-box; }

body{
margin:0;
font-family:"Georgia", serif;
color:#e5e7eb;
background:
radial-gradient(circle at 30% 20%, rgba(255,255,255,0.04), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(255,255,255,0.03), transparent 45%),
linear-gradient(180deg,#020617,#020617,#030712);
}

.header{
position:fixed;
top:0; left:0; right:0;
height:72px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(8,10,14,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,215,160,.25);
z-index:100;
}

.logoText{
font-size:20px;
letter-spacing:.12em;
color:#f5d28c;
}

.container{
display:flex;
max-width:1400px;
margin:90px auto 20px auto;
gap:20px;
padding:0 16px;
height:calc(100vh - 110px);
}

.panel{
background:rgba(12,14,18,0.75);
backdrop-filter:blur(14px);
border-radius:14px;
padding:16px;
border:1px solid rgba(255,215,160,.25);
box-shadow:0 20px 50px rgba(0,0,0,.85);
display:flex;
flex-direction:column;
}

.categories{ width:260px; }
.products{ width:420px; }
.detail{ flex:1; overflow:auto; }

.badge{
font-size:10px;
padding:2px 6px;
border-radius:6px;
margin-left:6px;
color:white;
}

.badge-new{ background:#ef4444; }
.badge-hot{ background:#f59e0b; }
.badge-update{ background:#3b82f6; }

.categoryBtn{
width:100%;
margin:8px 0;
padding:12px;
border-radius:10px;
cursor:pointer;
background:linear-gradient(180deg,#0b0f16,#020617);
border:1px solid rgba(255,215,160,.12);
}

.searchArea{
position:sticky;
top:0;
background:rgba(12,14,18,0.95);
padding-bottom:10px;
z-index:2;
}

.productScroll{
overflow:auto;
flex:1;
}

.card{
display:flex;
gap:12px;
align-items:center;
background:linear-gradient(180deg,#020617,#030712);
border-radius:12px;
padding:10px;
margin-bottom:12px;
cursor:pointer;
border:1px solid rgba(255,215,160,.20);
}

.card img{
width:72px;
height:72px;
object-fit:cover;
border-radius:8px;
}

.modal{
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:#020617;
padding:20px;
overflow:auto;
display:none;
z-index:1000;
}
</style></head><body><div class="header">
<div class="logoText">MT GROUP PRODUCT LIST</div>
</div><div class="container"><div class="panel categories">
<h3>Contents</h3>
<div id="categoryList"></div>
</div><div class="panel products"><div class="searchArea">
<h3>product</h3>
<input id="searchBox" placeholder="商品検索" oninput="searchAll()">
</div><div class="productScroll">
<div id="productList"></div>
</div></div><div class="panel detail">
<h3>説明</h3>
<div id="productDetail">製品を選択してください</div>
</div></div><div id="mobileModal" class="modal"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAii9UA3YBztj3XE8QErStcf-TpIkFJYWQ",
authDomain:"mtgroup-df495.firebaseapp.com",
projectId:"mtgroup-df495",
storageBucket:"mtgroup-df495.firebasestorage.app",
messagingSenderId:"33007954637",
appId:"1:33007954637:web:0a1c249df6764f8d855784"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[];
let products=[];
let currentCategory=null;

function getYoutubeID(url){

if(!url) return null;

if(url.includes("watch?v="))
return url.split("watch?v=")[1].split("&")[0];

if(url.includes("youtu.be/"))
return url.split("youtu.be/")[1].split("?")[0];

return null;

}

function getYoutubeThumb(url){

const id=getYoutubeID(url);

if(!id) return null;

return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

}

function getYoutubeEmbed(url){

const id=getYoutubeID(url);

if(!id) return url;

return `https://www.youtube.com/embed/${id}`;

}

const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const productDetail=document.getElementById("productDetail");
const modal=document.getElementById("mobileModal");

function searchAll(){
currentCategory=null;
renderCategories();
renderProducts();
}

function showProduct(p){

let videoHTML="";

if(p.video){

videoHTML=`
<iframe width="100%" height="315"
src="${getYoutubeEmbed(p.video)}"
frameborder="0"
allowfullscreen
style="margin-top:10px;border-radius:8px;">
</iframe>`;

}

const html=`
<h3>${p.name}</h3>
<p>${p.desc||""}</p>
${p.image?`<img src="${p.image}" style="max-width:100%;border-radius:8px;">`:""}
${videoHTML}
`;

if(window.innerWidth<=700){
modal.style.display="block";
modal.innerHTML=`<button onclick="closeModal()">← 戻る</button>${html}`;
}else{
productDetail.innerHTML=html;
}

}

window.closeModal=function(){
modal.style.display="none";
}

function renderCategories(){

categoryList.innerHTML="";

const all=document.createElement("div");
all.className="categoryBtn";
all.textContent="すべて";
all.onclick=()=>{
currentCategory=null;
renderProducts();
};
categoryList.appendChild(all);

categories.forEach(cat=>{
const btn=document.createElement("div");
btn.className="categoryBtn";
btn.textContent=cat.name;
btn.onclick=()=>{
currentCategory=cat.name;
renderProducts();
};
categoryList.appendChild(btn);
});

}

onSnapshot(query(collection(db,"categories"),orderBy("order")), snap=>{
categories=[];
snap.forEach(d=>categories.push(d.data()));
renderCategories();
});

onSnapshot(query(collection(db,"products"),orderBy("order")), snap=>{
products=[];
snap.forEach(d=>products.push(d.data()));
renderProducts();
});

function renderProducts(){

const keyword=document.getElementById("searchBox").value.toLowerCase();

productList.innerHTML="";

products
.filter(p=>!currentCategory||p.category===currentCategory)
.filter(p=>p.name.toLowerCase().includes(keyword))
.forEach(p=>{

let thumb=p.image;

if(!thumb && p.video)
thumb=getYoutubeThumb(p.video);

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
${thumb?`<img src="${thumb}">`:""}
<div>${p.name}</div>
`;

card.onclick=()=>showProduct(p);

productList.appendChild(card);

});

}

</script><script>
const font=localStorage.getItem("siteFont");
if(font) document.body.style.fontFamily=font;
</script></body>
</html>
