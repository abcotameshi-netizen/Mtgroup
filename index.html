<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mtgroup</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">
<div class="logoText">Mtgroup</div>
</div>

<div class="container">

<div class="panel categories">
<h3>カテゴリ</h3>
<div id="categoryList"></div>
</div>

<div class="panel products">
<input id="searchBox" placeholder="検索" oninput="searchAll()">
<div id="productList"></div>
</div>

<div class="panel detail">
<h3>商品説明</h3>
<div id="productDetail"></div>
</div>

</div>

<div id="modal" class="modal"></div>

<!-- ===== 既存歯車背景 ===== -->

<div class="gear-bg">

<div class="gear gear1"></div>
<div class="gear gear2"></div>
<div class="gear gear3"></div>
<div class="gear gear4"></div>
<div class="gear gear5"></div>

</div>

<!-- ===== 追加：工場ギア背景 ===== -->

<div class="factoryGearSystem">

<div class="factoryGear factoryGearA"></div>
<div class="factoryGear factoryGearB"></div>
<div class="factoryGear factoryGearC"></div>
<div class="factoryGear factoryGearD"></div>

<div class="factoryHoloGear factoryHoloA"></div>
<div class="factoryHoloGear factoryHoloB"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAii9UA3YBztj3XE8QErStcf-TpIkFJYWQ",
  authDomain: "mtgroup-df495.firebaseapp.com",
  projectId: "mtgroup-df495",
  storageBucket: "mtgroup-df495.firebasestorage.app",
  messagingSenderId: "33007954637",
  appId: "1:33007954637:web:0a1c249df6764f8d855784",
  measurementId: "G-CMNF3DKT7G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories=[];
let products=[];
let currentCategory=null;

const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const detail=document.getElementById("productDetail");
const modal=document.getElementById("modal");

/* ===== メディア判定 ===== */

function detectMedia(url){

if(!url) return {type:"none"};
url=url.trim();

if(url.includes("youtu")){
let id="";
if(url.includes("youtu.be/")){
id=url.split("youtu.be/")[1].split("?")[0];
}
else if(url.includes("watch?v=")){
id=url.split("watch?v=")[1].split("&")[0];
}
else if(url.includes("embed/")){
id=url.split("embed/")[1].split("?")[0];
}
return {type:"youtube",src:"https://www.youtube.com/embed/"+id};
}

if(url.includes("vimeo.com")){
let id=url.split("/").pop().split("?")[0];
return {type:"vimeo",src:"https://player.vimeo.com/video/"+id};
}

if(url.match(/\.(mp4|webm|ogg)$/i)){
return {type:"video",src:url};
}

if(url.match(/\.(jpg|jpeg|png|gif|webp)$/i)){
return {type:"image",src:url};
}

return {type:"iframe",src:url};
}

/* ===== カテゴリ表示 ===== */

function renderCategories(){
categoryList.innerHTML="";
categories.forEach(c=>{
const div=document.createElement("div");
div.className="categoryBtn";
div.onclick=()=>{
currentCategory=c.name;
renderProducts();
detail.innerHTML="";
};
div.innerHTML=`
<div style="display:flex;align-items:center;gap:10px">
<img src="${c.image||""}" onerror="this.style.display='none'">
<span>${c.name}</span>
</div>`;
categoryList.appendChild(div);
});
}

/* ===== 商品一覧 ===== */

function renderProducts(){
productList.innerHTML="";
products
.filter(p=>p.category===currentCategory)
.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.onclick=()=>showDetail(p);
div.innerHTML=`
<img src="${p.image||""}" onerror="this.style.display='none'">
<div class="title">${p.name}</div>`;
productList.appendChild(div);
});
}

/* ===== 検索 ===== */

window.searchAll=function(){
const q=document.getElementById("searchBox").value.toLowerCase();
productList.innerHTML="";
products
.filter(p=>p.category===currentCategory &&
(p.name||"").toLowerCase().includes(q))
.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.onclick=()=>showDetail(p);
div.innerHTML=`
<img src="${p.image||""}" onerror="this.style.display='none'">
<div class="title">${p.name}</div>`;
productList.appendChild(div);
});
}

/* ===== 詳細表示 ===== */

function showDetail(p){

let description=(p.desc||"").replace(/\n/g,"<br>");
let html=`<h2>${p.name}</h2><div class="desc">${description}</div>`;

if(p.image){
let media=detectMedia(p.image);
if(media.type==="image"){
html+=`<img src="${media.src}">`;
}
}

if(p.video){
let media=detectMedia(p.video);

if(media.type==="youtube"||media.type==="vimeo"){
html+=`<iframe src="${media.src}" frameborder="0" allowfullscreen></iframe>`;
}
else if(media.type==="video"){
html+=`<video src="${media.src}" controls style="width:100%"></video>`;
}
else if(media.type==="iframe"){
html+=`<iframe src="${media.src}" frameborder="0"></iframe>`;
}
}

if(window.innerWidth>700){
detail.innerHTML=html;
}else{
modal.innerHTML=`<button class="closeBtn" onclick="closeModal()">閉じる</button>${html}`;
modal.style.display="block";
}
}

window.closeModal=function(){
modal.style.display="none";
}

/* ===== Firebase ===== */

onSnapshot(query(collection(db,"categories"),orderBy("order")),s=>{
categories=s.docs.map(d=>d.data());
renderCategories();
});

onSnapshot(query(collection(db,"products"),orderBy("order")),s=>{
products=s.docs.map(d=>d.data());

if(currentCategory){
renderProducts();
}

});

</script>

</body>
</html>
