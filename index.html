<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>製品一覧</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Noto Sans JP";
color:#e5e7eb;
background:#020617;
}


/* ヘッダー */

.header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

display:flex;
align-items:center;
justify-content:center;

background:#020617;

border-bottom:1px solid #333;

z-index:100;

}

.logoText{

font-size:18px;

}


/* メイン */

.container{

max-width:1200px;

margin:70px auto 0;

padding:10px;

display:flex;

gap:16px;

}


/* パネル */

.panel{

background:#030712;

border-radius:12px;

padding:12px;

flex-direction:column;

display:flex;

border:1px solid #222;

}


/* PC */

.categories{ width:250px; }
.products{ width:420px; }
.detail{ flex:1; }



/* カテゴリ */

.categoryBtn{

padding:12px;

margin:6px 0;

background:#020617;

border-radius:10px;

cursor:pointer;

text-align:center;

}


/* 検索 */

#searchBox{

width:100%;

padding:10px;

border-radius:8px;

border:none;

margin-top:6px;

font-size:16px;

}


/* 商品 */

.card{

display:flex;

gap:12px;

padding:12px;

margin-bottom:10px;

background:#020617;

border-radius:10px;

cursor:pointer;

align-items:center;

}

.card img{

width:70px;
height:70px;

object-fit:cover;

border-radius:8px;

}


/* 説明改行対応 */

#productDetail{

white-space:pre-wrap;
line-height:1.7;
word-break:break-word;

}


/* モーダル */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#020617;

overflow:auto;

padding:20px;

display:none;

z-index:1000;

}



/* ===== スマホUI ===== */

@media(max-width:700px){

.container{

flex-direction:column;

margin-top:65px;

}


.categories{

width:100%;

}

.products{

width:100%;

}

.detail{

display:none;

}


/* カテゴリ横スクロール */

#categoryList{

display:flex;

gap:8px;

overflow:auto;

}

.categoryBtn{

white-space:nowrap;

min-width:100px;

}


/* カード大きく */

.card{

padding:14px;

}

.card img{

width:80px;
height:80px;

}


/* モーダル文字大きく */

.modal{

font-size:17px;

line-height:1.7;

}


}

</style>

</head>


<body>



<div class="header">

<div class="logoText">

MT GROUP PRODUCT LIST

</div>

</div>



<div class="container">



<div class="panel categories">

<h3>Contents</h3>

<div id="categoryList"></div>

</div>



<div class="panel products">

<h3>product</h3>

<input id="searchBox"
placeholder="商品検索"
oninput="searchAll()">

<div id="productList"></div>

</div>



<div class="panel detail">

<h3>説明</h3>

<div id="productDetail">

製品を選択してください

</div>

</div>



</div>



<div id="mobileModal" class="modal"></div>




<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyAii9UA3YBztj3XE8QErStcf-TpIkFJYWQ",
authDomain:"mtgroup-df495.firebaseapp.com",
projectId:"mtgroup-df495",
storageBucket:"mtgroup-df495.firebasestorage.app",
messagingSenderId:"33007954637",
appId:"1:33007954637:web:0a1c249df6764f8d855784"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);



let categories=[];
let products=[];
let currentCategory=null;



function getYoutubeID(url){

if(!url) return null;

if(url.includes("watch?v="))
return url.split("watch?v=")[1].split("&")[0];

if(url.includes("youtu.be/"))
return url.split("youtu.be/")[1].split("?")[0];

return null;

}



function getYoutubeThumb(url){

const id=getYoutubeID(url);

if(!id) return null;

return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

}



function getYoutubeEmbed(url){

const id=getYoutubeID(url);

if(!id) return url;

return `https://www.youtube.com/embed/${id}`;

}



const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const productDetail=document.getElementById("productDetail");
const modal=document.getElementById("mobileModal");



function searchAll(){

currentCategory=null;

renderCategories();

renderProducts();

}



function showProduct(p){

let videoHTML="";

if(p.video){

videoHTML=`
<iframe width="100%" height="250"
src="${getYoutubeEmbed(p.video)}"
frameborder="0"
allowfullscreen
style="margin-top:10px;border-radius:8px;">
</iframe>`;

}


/* ★改行完全対応 */

const html=`

<h2>${p.name}</h2>

<div style="
white-space:pre-wrap;
line-height:1.7;
word-break:break-word;
">

${p.desc||""}

</div>

${p.image?`<img src="${p.image}" style="max-width:100%;border-radius:8px;">`:""}

${videoHTML}

`;


if(window.innerWidth<=700){

modal.style.display="block";

modal.innerHTML=`

<button onclick="closeModal()"
style="font-size:18px;margin-bottom:20px;">
← 戻る
</button>

${html}

`;

}else{

productDetail.innerHTML=html;

}

}



window.closeModal=function(){

modal.style.display="none";

}



function renderCategories(){

categoryList.innerHTML="";

const all=document.createElement("div");

all.className="categoryBtn";

all.textContent="すべて";

all.onclick=()=>{

currentCategory=null;

renderProducts();

};

categoryList.appendChild(all);



categories.forEach(cat=>{

const btn=document.createElement("div");

btn.className="categoryBtn";

btn.textContent=cat.name;

btn.onclick=()=>{

currentCategory=cat.name;

renderProducts();

};

categoryList.appendChild(btn);

});


}



onSnapshot(query(collection(db,"categories"),orderBy("order")), snap=>{

categories=[];

snap.forEach(d=>categories.push(d.data()));

renderCategories();

});



onSnapshot(query(collection(db,"products"),orderBy("order")), snap=>{

products=[];

snap.forEach(d=>products.push(d.data()));

renderProducts();

});



function renderProducts(){

const keyword=document.getElementById("searchBox").value.toLowerCase();

productList.innerHTML="";


products

.filter(p=>!currentCategory||p.category===currentCategory)

.filter(p=>p.name.toLowerCase().includes(keyword))

.forEach(p=>{

let thumb=p.image;

if(!thumb && p.video)
thumb=getYoutubeThumb(p.video);


const card=document.createElement("div");

card.className="card";

card.innerHTML=`

${thumb?`<img src="${thumb}">`:""}

<div>${p.name}</div>

`;


card.onclick=()=>showProduct(p);

productList.appendChild(card);

});

}


</script>



<script>

const font=localStorage.getItem("siteFont");

if(font)
document.body.style.fontFamily=font;

</script>


</body>
</html>
